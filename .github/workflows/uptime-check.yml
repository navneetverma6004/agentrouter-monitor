name: AgentRouter Uptime Monitor

on:
  schedule:
    # Every 5 minutes. GitHub may delay this a few minutes under load --
    # that's a platform limitation, not a bug in this workflow.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger a manual test run from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore last known state
        uses: actions/cache@v4
        with:
          path: state.json
          key: agentrouter-state-${{ github.run_id }}
          restore-keys: |
            agentrouter-state-

      - name: Check AgentRouter
        env:
          AGENTROUTER_API_KEY: ${{ secrets.AGENTROUTER_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 monitor.py

      - name: Save state for next run
        uses: actions/cache@v4
        with:
          path: state.json
          key: agentrouter-state-${{ github.run_id }}
